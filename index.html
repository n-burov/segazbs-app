<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SegaZBS Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <img src="https://i.postimg.cc/RFNNQ4RP/71a2c23b-f462-482a-8e89-f0c4336d3d98.jpg" alt="SegaZBS" class="avatar">
            <div>
                <h1>SegaZBS Helper</h1>
                <p>База знаний для WoW</p>
            </div>
        </header>

        <div class="main-menu">
            <div class="menu-grid">
                <a href="addons.html" class="menu-card">
                    <i class="fas fa-puzzle-piece"></i>
                    <span>Аддоны</span>
                    <small>Список всех аддонов</small>
                </a>
                <a href="configs.html" class="menu-card">
                    <i class="fas fa-sliders-h"></i>
                    <span>Конфиги</span>
                    <small>Настройки для аддонов</small>
                </a>
                <a href="macros.html" class="menu-card">
                    <i class="fas fa-terminal"></i>
                    <span>Макросы</span>
                    <small>Готовые макросы</small>
                </a>
            </div>

            <div class="quick-info">
                <div class="info-badge">
                    <i class="fas fa-database"></i>
                    <span id="totalItems">Загрузка...</span>
                </div>
                <div class="info-badge">
                    <i class="fas fa-users"></i>
                    <span>Стример SegaZBS</span>
                </div>
            </div>

            <!-- Кнопка админки (только для доверенных) -->
            <button id="adminBtn" class="admin-btn" style="display:none;" onclick="openAdmin()">
                <i class="fas fa-crown"></i> Управление
            </button>
        </div>

        <!-- Социальные сети -->
        <div class="social-bar">
            <a href="https://t.me/segazbs" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://twitch.tv/segazbs" target="_blank"><i class="fab fa-twitch"></i></a>
            <a href="https://youtube.com/segazbs" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.gg/segazbs" target="_blank"><i class="fab fa-discord"></i></a>
        </div>

        <button class="close-btn" onclick="closeApp()">
            <i class="fas fa-chevron-left"></i> Закрыть
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Проверка на админа (по ID)
        const ADMIN_IDS = [123456789, 987654321]; // ID админов
        const userId = tg.initDataUnsafe?.user?.id;

        if (ADMIN_IDS.includes(userId)) {
            document.getElementById('adminBtn').style.display = 'flex';
        }

        function closeApp() {
            tg.close();
        }

        function openAdmin() {
            window.location.href = 'admin.html';
        }

        // Подсчёт элементов
        async function loadStats() {
            try {
                const [addons, configs, macros] = await Promise.all([
                    fetch('data/addons.json').then(r => r.json()),
                    fetch('data/configs.json').then(r => r.json()),
                    fetch('data/macros.json').then(r => r.json())
                ]);
                const total = addons.length + configs.length + macros.length;
                document.getElementById('totalItems').textContent = `${total} элементов`;
            } catch {
                document.getElementById('totalItems').textContent = 'Данные загружены';
            }
        }
        loadStats();
    </script>
</body>
</html>
